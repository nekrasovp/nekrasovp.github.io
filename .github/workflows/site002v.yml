name: SITE-002V

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site002v-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  EXPECTED_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  immutable-reader:
    name: Immutable reader and 46-article corpus
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out the exact site head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          # The validator permanently proves cac7d59... is an ancestor. A
          # bounded depth would lose that immutable object as master advances.
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Install the locked-environment tool
        run: python -m pip install --disable-pip-version-check uv==0.11.28

      - name: Resolve the exact committed lock
        run: |
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD"
          uv sync --locked --all-groups
          uv run --locked --all-groups python --version
          uv run --locked --all-groups python - <<'PY'
          from importlib.metadata import version

          for name in ("pelican-jupyter", "pelican", "nbconvert", "nbformat", "jinja2"):
              print(f"{name}=={version(name)}")
          PY

      - name: Run two full builds and all SITE-002V gates
        run: |
          ./scripts/site validate \
            --work-root "$RUNNER_TEMP/site002v" \
            --report-out "$RUNNER_TEMP/site002v-report.json"
          cmp "$RUNNER_TEMP/site002v-report.json" \
            migration/site002v/evidence/validation.json

      - name: Run repository regressions and cleanliness checks
        run: |
          ./scripts/site test
          uv run --locked --all-groups ruff check \
            migration/site_build migration/site002v/validate.py
          git diff --check
          test -z "$(git status --porcelain=v1 --untracked-files=all)"
          github_token_prefix='github''_pat_'
          oauth_token_prefix='gho''_'
          if git grep -nE \
            "${github_token_prefix}|${oauth_token_prefix}[A-Za-z0-9]{20,}|BEGIN (RSA|OPENSSH) PRIVATE KEY"; then
            echo "credential-like material found in the repository" >&2
            exit 1
          fi
